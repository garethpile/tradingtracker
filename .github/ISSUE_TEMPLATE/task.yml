name: Task
description: Implementation task, technical task, or operational task
labels:
  - task
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Details
  - type: textarea
    id: definition
    attributes:
      label: Definition of done
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - ux
        - backend
        - platform
        - providers
        - documentation
