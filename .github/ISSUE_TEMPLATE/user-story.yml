name: User Story
description: Capture a user story / product outcome
labels:
  - story
body:
  - type: textarea
    id: story
    attributes:
      label: User story
      description: Use the standard story format
      placeholder: |
        As a <user>
        I want <thing>
        So that <outcome>
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Background, screenshots, links, business context
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - priority:high
        - priority:medium
        - priority:low
    validations:
      required: true
  - type: input
    id: ready
    attributes:
      label: Ready for Ikigai label
      description: Type yes if this should be picked up automatically once labelled
      placeholder: yes / no
